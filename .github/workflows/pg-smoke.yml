name: PostgreSQL Smoke Tests

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  pg-smoke:
    name: PGTable Smoke Tests (PostgreSQL ${{ matrix.pg }})
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        pg: ['18']
      fail-fast: false

    services:
      postgres:
        image: postgres:${{ matrix.pg }}
        env:
          POSTGRES_USER: lightrag
          POSTGRES_PASSWORD: lightrag_smoke
          POSTGRES_DB: lightrag_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lightrag -d lightrag_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: lightrag
      POSTGRES_PASSWORD: lightrag_smoke
      POSTGRES_DATABASE: lightrag_test

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[api]"
          uv pip install --system pytest pytest-asyncio asyncpg

      - name: Run pg_smoke tests
        run: |
          pytest tests/kg/pgtable_impl/test_pgtable_smoke.py -m pg_smoke --run-integration -v --tb=short

      - name: Run shared graph contract suite (PGTableGraphStorage)
        env:
          LIGHTRAG_GRAPH_STORAGE: PGTableGraphStorage
        run: |
          set -o pipefail
          # -s (no capture) so a swallowed-failure marker reaches the log even for
          # a test pytest records as passed (see guard 2). tee keeps the log for
          # the grep; pipefail preserves pytest's own exit code.
          pytest tests/kg/test_graph_storage.py -m integration --run-integration \
            -s -v --tb=short --junitxml=contract.xml 2>&1 | tee contract.log
          # Guard 1 (env-skip false-green): the storage fixture skips when the
          # backend isn't configured, so a misconfigured env would exit 0 having
          # run zero tests. Require tests>0, skipped==0, and no failures/errors.
          python - <<'PY'
          import sys, xml.etree.ElementTree as ET
          root = ET.parse("contract.xml").getroot()
          suite = root if root.tag == "testsuite" else root.find("testsuite")
          tests = int(suite.get("tests", 0))
          skipped = int(suite.get("skipped", 0))
          failed = int(suite.get("failures", 0)) + int(suite.get("errors", 0))
          print(f"contract suite: tests={tests} skipped={skipped} failed={failed}")
          if tests == 0:
              sys.exit("no contract tests ran - backend/env misconfigured")
          if skipped:
              sys.exit(f"{skipped} contract tests skipped - all must run in CI")
          if failed:
              sys.exit(f"{failed} contract tests failed")
          PY
          # Guard 2 (swallowed-failure false-green): most of these shared tests
          # wrap their body in try/except and `return False` on failure, which
          # pytest records as a PASSED test (only a PytestReturnNotNoneWarning),
          # so a swallowed assertion would slip past guard 1. Fail on the marker
          # those except blocks print.
          if grep -q "error occurred during the test" contract.log; then
            echo "A contract test swallowed an exception (returned False) - failing."
            exit 1
          fi
